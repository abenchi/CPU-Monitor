<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }
        
        .cpu-name {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-bottom: 5px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .percentage {
            font-size: 52px;
            font-weight: 700;
            line-height: 1;
            transition: color 0.3s ease;
        }
        
        .label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .disconnected {
            color: #eb4d4b;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="cpu-name" id="cpuName">Connexion...</div>
    <div class="percentage" id="percentage">--%</div>
    <div class="label">CPU</div>

    <script>
        let ws = null;
        
        function getColor(usage) {
            if (usage < 30) return '#00d4aa';
            if (usage < 60) return '#f9ca24';
            if (usage < 85) return '#f0932b';
            return '#eb4d4b';
        }
        
        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}`);
            
            ws.onopen = () => {
                document.getElementById('cpuName').classList.remove('disconnected');
            };
            
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                document.getElementById('cpuName').textContent = d.cpu.brand;
                document.getElementById('percentage').textContent = Math.round(d.cpu.usage) + '%';
                document.getElementById('percentage').style.color = getColor(d.cpu.usage);
            };
            
            ws.onclose = () => {
                document.getElementById('cpuName').textContent = 'Déconnecté';
                document.getElementById('cpuName').classList.add('disconnected');
                document.getElementById('percentage').textContent = '--%';
                document.getElementById('percentage').style.color = '#eb4d4b';
                setTimeout(connect, 2000);
            };
            
            ws.onerror = () => ws.close();
        }
        
        connect();
    </script>
</body>
</html>
